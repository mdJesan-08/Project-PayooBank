<!DOCTYPE html>
<html lang="en" data-theem="cupcake">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- tailwind + daisy ui -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" type="text/css" />

    <!-- fabicon -->
     <link rel="shortcut icon" href="assets/logo.png" type="image/x-icon">

     <!-- Oufit font -->

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&family=Outfit:wght@100..900&display=swap" rel="stylesheet">

    <!-- font awesome -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style>
        *{
            font-family: "Manrope", sans-serif;
        }
    </style>

    <title>Payoo | Login</title>
</head>

<body class="min-h-screen max-w-md  mx-auto shadow">

    <!-- payoo logo -->
    <div class="logo mx-auto w-50 pt-32">
        <img src="./assets/Logo-full.png" alt="">
    </div>

    <!-- login card -->
    <div class="card  max-w-sm w-11/12 shadow mx-auto mt-5 rounded-5xl ">

      <div class="card-body">
        <fieldset class="fieldset">

          <!-- Email -->
          <label class="label font-bold text-neutral">Mobile Number</label>
          <input id ="number-input" type="text" minlength="11"  maxlength="11" class="input rounded-full bg-base-200" placeholder="Enter Your Number"/>

          <!-- password -->
          <label class="label font-bold text-neutral">Password</label>
          <input id ="pass-input" type="password" class="input rounded-full bg-base-200"placeholder="Enter 4 digit pin" />

          <!-- Login -->
          <!-- <div><a class="link link-hover">Forgot password?</a></div> -->

          <button id="login-btn" class=" btn btn-primary mt-4 rounded-full">Login</button>

        </fieldset>
      </div>
    </div>

    <script src="scripts/login.js"></script>

</body>
</html>
